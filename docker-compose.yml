services:

  # ─── MongoDB ──────────────────────────────────────────────────────────────────
  db:
    image: mongo:7
    container_name: trackflow-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - trackflow_db:/data/db

  # ─── Spring Boot Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trackflow-backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      MONGO_URI: mongodb://db:27017/trackflow
      JWT_SECRET:  ${JWT_SECRET:-4b6f4e7a2d3a6a3b4d5c4e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b}
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"

volumes:
  trackflow_db:
