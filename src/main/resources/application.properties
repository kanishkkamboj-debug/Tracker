jwt.secret=${JWT_SECRET:4b6f4e7a2d3a6a3b4d5c4e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ─── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}
