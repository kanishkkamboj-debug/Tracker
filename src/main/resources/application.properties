# ─── MongoDB ──────────────────────────────────────────────────────────────────
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/trackflow}

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── JWT ──────────────────────────────────────────────────────────────────────
